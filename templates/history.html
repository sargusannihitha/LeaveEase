<!DOCTYPE html>
<html>
<head>
    <title>Leave History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Leave History</h1>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Faculty</th>
            <th>Department</th>
            <th>Leave Type</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Status</th>
        </tr>

        {% for leave in leaves %}

        <tr>
            <td>{{ leave[0] }}</td>
            <td>{{ leave[1] }}</td>
            <td>{{ leave[7] }}</td>
            <td>{{ leave[2] }}</td>
            <td>{{ leave[3] }}</td>
            <td>{{ leave[4] }}</td>
            <td>{{ leave[6] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>
