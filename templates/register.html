<!DOCTYPE html>
<html>
<head>
    <title>Faculty Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow mx-auto" style="width:500px;">

        <h2 class="text-center text-success">
            Faculty Registration
        </h2>

        <form method="POST">

            <input type="text"
                   class="form-control mb-3"
                   name="name"
                   placeholder="Name"
                   required>

            <input type="email"
                   class="form-control mb-3"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="text"
                   class="form-control mb-3"
                   name="department"
                   placeholder="Department"
                   required>

            <input type="password"
                   class="form-control mb-3"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit"
                    class="btn btn-success w-100">
                Register
            </button>

        </form>

    </div>

</div>

</body>
</html>
