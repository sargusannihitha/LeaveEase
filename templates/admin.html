<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Admin Dashboard</h1>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Faculty</th>
            <th>Department</th>
            <th>Leave Type</th>
            <th>Status</th>
            <th>Suggested Substitute</th>
            <th>Action</th>
        </tr>

        {% for leave in leaves %}

        <tr>

            <td>{{ leave[0] }}</td>
            <td>{{ leave[1] }}</td>
            <td>{{ leave[7] }}</td>
            <td>{{ leave[2] }}</td>
            <td>{{ leave[6] }}</td>

            <td>
                {{ suggestions[leave[0]] }}
            </td>

            <td>

                <a href="/approve/{{ leave[0] }}"
                   class="btn btn-success btn-sm">
                   Approve
                </a>

                <a href="/reject/{{ leave[0] }}"
                   class="btn btn-danger btn-sm">
                   Reject
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</body>
</html>
